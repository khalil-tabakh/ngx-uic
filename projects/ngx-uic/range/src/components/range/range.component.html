<div class="track">
    @for (split of _splits(); track $index) {
        <div
            class="segment"
            ngxSegment
            [min]="_min()"
            [lowest]="type() === 'single' ? _origin() : lowest()"
            [highest]="highest()"
            [max]="_max()"
            [split]="split"
            [splits]="_splits()"
        ></div>
    }
    <div
        class="segment"
        ngxSegment
        [min]="_min()"
        [lowest]="type() === 'single' ? _origin() : lowest()"
        [highest]="highest()"
        [max]="_max()"
        [split]="_max()"
        [splits]="_splits()"
    ></div>
</div>
<div class="slider" (pointerdown)="onSliding($event)" #sliderRef>
    @let low = type() === 'single' ? null : (lowest() - _min()) / (_max() - _min()) * 100;
    <label tabindex="0" class="thumb" [style.--low]="low" #thumbRef>
        <input type="range" [min]="_min()" [max]="_max()" [step]="step().toString()" [value]="lowest()" />
    </label>
    @for (mark of _marks(); track $index) {
        <div
            class="mark"
            [class.mark--lower]="mark < lowest() || (mark < highest() && type() === 'single')"
            [class.mark--upper]="mark > highest()"
            [style.--left]="(mark - _min()) / (_max() - _min()) * 100"
        >
        </div>
    }
    @let high = (highest() - _min()) / (_max() - _min()) * 100;
    <label tabindex="0" class="thumb" [style.--high]="high" #thumbRef>
        <input type="range" [min]="_min()" [max]="_max()" [step]="step().toString()" [value]="highest()" />
    </label>
</div>

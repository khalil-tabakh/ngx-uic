<div class="track">
    @for (split of splits(); track $index) {
        <div class="segment" ngxSegment [split]="split" [bounds]="[min(), lowest(), highest(), max()]" [splits]="splits()"></div>
    }
    <div class="segment" ngxSegment [split]="max()" [bounds]="[min(), lowest(), highest(), max()]" [splits]="splits()"></div>
</div>
<div class="slider" (pointerdown)="onSliding($event)" #sliderRef>
    <label class="thumb" [style.--low]="low()" #thumbRef>
        <input type="range" [min]="min()" [max]="max()" [step]="step()" [value]="lowest()" />
    </label>
    @if (marks()) {
        @for (mark of marks(); track $index) {
            @let left = (mark - min()) / (max() - min()) * 100;
            <div
                class="mark"
                [class.mark--lower]="mark < lowest() || (mark < highest() && type() === 'simple')"
                [class.mark--upper]="mark > highest()"
                [style.--left]="left"
            >
            </div>
        }
    }
    <label class="thumb" [style.--high]="high()" #thumbRef>
        <input type="range" [min]="min()" [max]="max()" [step]="step()" [value]="highest()" />
    </label>
</div>

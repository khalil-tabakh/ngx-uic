<div class="track">
    @for (split of splits(); track $index) {
        <div
            class="segment"
            ngxSegment
            [min]="min()"
            [lowest]="type() === 'simple' ? origin() : lowest()"
            [highest]="highest()"
            [max]="max()"
            [split]="split"
            [splits]="splits()"
        ></div>
    }
    <div
        class="segment"
        ngxSegment
        [min]="min()"
        [lowest]="type() === 'simple' ? origin() : lowest()"
        [highest]="highest()"
        [max]="max()"
        [split]="max()"
        [splits]="splits()"
    ></div>
</div>
<div class="slider" (keydown)="onPressing($event)" (pointerdown)="onSliding($event)" #sliderRef>
    <label tabindex="0" class="thumb" [style.--low]="low()" #thumbRef>
        <input type="range" [min]="min()" [max]="max()" [step]="step()" [value]="lowest()" />
    </label>
    @if (marks()) {
        @for (mark of marks(); track $index) {
            @let left = (mark - min()) / (max() - min()) * 100;
            <div
                class="mark"
                [class.mark--lower]="mark < lowest() || (mark < highest() && type() === 'simple')"
                [class.mark--upper]="mark > highest()"
                [style.--left]="left"
            >
            </div>
        }
    }
    <label tabindex="0" class="thumb" [style.--high]="high()" #thumbRef>
        <input type="range" [min]="min()" [max]="max()" [step]="step()" [value]="highest()" />
    </label>
</div>

<div class="track" [style.--low]="low()" [style.--high]="high()" #trackRef>
    <div class="progress"></div>
    <div class="slider" #sliderRef>
        <label class="thumb" #thumbRef>
            <input type="range" [min]="min()" [max]="max()" [step]="step()" [value]="lowest()" />
        </label>
        @if (marks()) {
            @let marks = (max() - min()) / step() + 1;
            @for (mark of [].constructor(marks); track $index) {
                @let value = $index * step();
                <div
                    class="mark"
                    [class.mark--lower]="value < lowest() || (value < highest() && type() === 'simple')"
                    [class.mark--upper]="value > highest()"
                >
                </div>
            }
        }
        <label class="thumb" #thumbRef>
            <input type="range" [min]="min()" [max]="max()" [step]="step()" [value]="highest()" />
        </label>
    </div>
</div>
